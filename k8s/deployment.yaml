apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-webdav
  namespace: default
  labels:
    app: paperless-webdav
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paperless-webdav
  template:
    metadata:
      labels:
        app: paperless-webdav
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: paperless-webdav
                topologyKey: kubernetes.io/hostname
      containers:
        - name: paperless-webdav
          # Image tag is set by CI pipeline via kubectl set image
          image: ghcr.io/barryw/paperless-webdav:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: admin
            - containerPort: 8081
              name: webdav
          env:
            - name: PAPERLESS_URL
              value: "http://paperless-service.default.svc.cluster.local:8000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: paperless-webdav
                  key: DATABASE_URL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-webdav
                  key: ENCRYPTION_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-webdav
                  key: SECRET_KEY
            # OIDC Authentication via Authentik
            - name: AUTH_MODE
              value: "oidc"
            - name: OIDC_ISSUER
              value: "https://auth.lan/application/o/paperless/"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: paperless-webdav
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperless-webdav
                  key: OIDC_CLIENT_SECRET
            # LDAP via Authentik outpost (for WebDAV basic auth)
            - name: LDAP_URL
              value: "ldap://ak-outpost-ldap-outpost.authentik.svc.cluster.local:389"
            - name: LDAP_BASE_DN
              value: "dc=ldap,dc=goauthentik,dc=io"
            # SSL/TLS
            - name: SSL_CERT_FILE
              value: "/etc/ssl/certs/ca-certificates.crt"
            - name: COOKIE_SECURE
              value: "true"
            # Logging
            - name: LOG_FORMAT
              value: "console"
            - name: LOG_LEVEL
              value: "INFO"
            # Redis for distributed WebDAV lock storage
            - name: REDIS_HOST
              value: "redis"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-webdav
  namespace: default
  labels:
    app: paperless-webdav
spec:
  selector:
    app: paperless-webdav
  ports:
    - name: admin
      port: 8080
      targetPort: 8080
    - name: webdav
      port: 8081
      targetPort: 8081
