# Woodpecker CI Pipeline for paperless-webdav
#
# Push to main: CI → version-bump → docker-build → release → deploy
# PR: CI only

labels:
  platform: linux/amd64

when:
  - event: [push, pull_request, manual]

steps:
  # ============================================
  # CI: Lint, Typecheck, Test
  # ============================================
  lint:
    image: python:3.12-slim
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run ruff check src/ tests/
      - uv run ruff format --check src/ tests/

  typecheck:
    image: python:3.12-slim
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run mypy src/
    depends_on: [lint]

  test:
    image: python:3.12-slim
    environment:
      PAPERLESS_URL: http://paperless.test
      DATABASE_URL: postgresql://test:test@localhost/test
      ENCRYPTION_KEY: aa8D7QnZUqkFGBniEyIfESXitQUijPhSjQZLIqltUy4=
      SECRET_KEY: test-secret-key-for-sessions
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run pytest --tb=short -q
    depends_on: [typecheck]

  # ============================================
  # Version Bump - determine new version, create tag
  # ============================================
  version-bump:
    image: python:3.12-slim
    when:
      - event: push
        branch: main
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update && apt-get install -y curl git
      # Install cog
      - curl -sL https://github.com/cocogitto/cocogitto/releases/download/6.2.0/cocogitto-6.2.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp
      - mv /tmp/x86_64-unknown-linux-musl/cog /usr/local/bin/
      # Configure git
      - git config --global user.email "ci@woodpecker.local"
      - git config --global user.name "Woodpecker CI"
      - git config --global --add safe.directory "$CI_WORKSPACE"
      - git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/$CI_REPO.git"
      # Unshallow and fetch all tags (CI uses shallow clone)
      - git fetch --unshallow origin || true
      - git fetch --tags origin
      # Check for version bump
      - echo "=== Checking for Version Bump ==="
      - 'LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0") && echo "Latest tag: $LATEST_TAG"'
      - 'cog check --from-latest-tag 2>/dev/null || echo "Warning - Some commits may not follow conventional commit format"'
      # Dry-run to detect if bump is needed - check output looks like a version (vX.Y.Z)
      - 'NEXT_VERSION=$(cog bump --auto --dry-run 2>&1)'
      - 'echo "Dry-run output: $NEXT_VERSION"'
      - 'echo "$NEXT_VERSION" | grep -qE "^v?[0-9]+\.[0-9]+\.[0-9]+" || { echo "No version bump needed"; echo "NONE" > /woodpecker/version.txt; exit 0; }'
      - 'echo "Next version will be: $NEXT_VERSION"'
      # Perform the actual bump
      - 'cog bump --auto'
      - 'NEW_TAG=$(git describe --tags --abbrev=0)'
      - 'echo "New version: $NEW_TAG"'
      - 'git push origin $NEW_TAG'
      - 'echo "$NEW_TAG" > /woodpecker/version.txt'
      # Save changelog for docker labels
      - 'cog changelog --at $NEW_TAG 2>/dev/null | head -50 > /woodpecker/changelog.txt || echo "Release $NEW_TAG" > /woodpecker/changelog.txt'
    depends_on: [test]

  # ============================================
  # Docker Build & Push to GHCR
  # ============================================
  docker-build:
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
    environment:
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - 'VERSION=$(cat /woodpecker/version.txt 2>/dev/null || echo "NONE")'
      - 'test "$VERSION" != "NONE" || { echo "No new version, skipping build"; exit 0; }'
      - mkdir -p /kaniko/.docker
      - 'echo "{\"auths\":{\"ghcr.io\":{\"username\":\"barryw\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json'
      # Prepare OCI labels
      - 'CHANGELOG=$(cat /woodpecker/changelog.txt 2>/dev/null | tr "\n" " " | sed "s/\"/\\\\\"/g" || echo "Release $VERSION")'
      - 'BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")'
      - 'echo "Building image: ghcr.io/barryw/paperless-webdav:$VERSION"'
      - '/kaniko/executor --dockerfile=Dockerfile --context=. --destination=ghcr.io/barryw/paperless-webdav:$VERSION --label "org.opencontainers.image.version=$VERSION" --label "org.opencontainers.image.created=$BUILD_DATE" --label "org.opencontainers.image.description=$CHANGELOG" --label "org.opencontainers.image.revision=$CI_COMMIT_SHA"'
    depends_on: [version-bump]

  # ============================================
  # Create GitHub Release (after successful build)
  # ============================================
  release:
    image: python:3.12-slim
    when:
      - event: push
        branch: main
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - 'VERSION=$(cat /woodpecker/version.txt 2>/dev/null || echo "NONE")'
      - 'test "$VERSION" != "NONE" || { echo "No new version, skipping release"; exit 0; }'
      - apt-get update && apt-get install -y curl git
      # Install cog and gh
      - curl -sL https://github.com/cocogitto/cocogitto/releases/download/6.2.0/cocogitto-6.2.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp
      - mv /tmp/x86_64-unknown-linux-musl/cog /usr/local/bin/
      - curl -sL https://github.com/cli/cli/releases/download/v2.63.2/gh_2.63.2_linux_amd64.tar.gz | tar xz -C /tmp
      - mv /tmp/gh_2.63.2_linux_amd64/bin/gh /usr/local/bin/
      - git config --global --add safe.directory "$CI_WORKSPACE"
      # Create GitHub release
      - 'echo "Creating release: $VERSION"'
      - 'RELEASE_NOTES=$(cog changelog --at $VERSION 2>/dev/null || echo "Release $VERSION")'
      - 'gh release create $VERSION --title "paperless-webdav $VERSION" --notes "$RELEASE_NOTES" --latest'
      - echo "=== Release Created ==="
    depends_on: [docker-build]

  # ============================================
  # Deploy to Kubernetes
  # ============================================
  deploy:
    image: bitnami/kubectl:latest
    when:
      - event: push
        branch: main
    commands:
      - 'VERSION=$(cat /woodpecker/version.txt 2>/dev/null || echo "NONE")'
      - 'test "$VERSION" != "NONE" || { echo "No new version, skipping deploy"; exit 0; }'
      - 'echo "Deploying version: $VERSION"'
      - 'kubectl -n default set image deployment/paperless-webdav paperless-webdav=ghcr.io/barryw/paperless-webdav:$VERSION'
      - 'kubectl -n default rollout status deployment/paperless-webdav --timeout=300s'
    depends_on: [release]
