# Woodpecker CI Pipeline for paperless-webdav
# Conventional commits + semantic versioning + auto-deploy to k8s

labels:
  platform: linux/amd64

when:
  - event: [push, pull_request, tag, manual]

steps:
  # ============================================
  # CI: Lint, Typecheck, Test
  # ============================================
  lint:
    image: python:3.12-slim
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run ruff check src/ tests/
      - uv run ruff format --check src/ tests/

  typecheck:
    image: python:3.12-slim
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run mypy src/
    depends_on: [lint]

  test:
    image: python:3.12-slim
    environment:
      PAPERLESS_URL: http://paperless.test
      DATABASE_URL: postgresql://test:test@localhost/test
      ENCRYPTION_KEY: aa8D7QnZUqkFGBniEyIfESXitQUijPhSjQZLIqltUy4=
      SECRET_KEY: test-secret-key-for-sessions
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run pytest --tb=short -q
    depends_on: [lint]

  # ============================================
  # Version Bump (main branch only)
  # ============================================
  version-bump:
    image: python:3.12-slim
    when:
      - event: push
        branch: main
    commands:
      - apt-get update && apt-get install -y curl git
      - curl -sL https://github.com/cocogitto/cocogitto/releases/download/6.2.0/cocogitto-6.2.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp
      - mv /tmp/x86_64-unknown-linux-musl/cog /usr/local/bin/
      - git config --global user.email "ci@woodpecker.local"
      - git config --global user.name "Woodpecker CI"
      - git config --global --add safe.directory /woodpecker/src/github.com/barryw/paperless-webdav
      - cog bump --auto || echo "No version bump needed"
    depends_on: [test, typecheck]

  # ============================================
  # Docker Build & Push to GHCR (using kaniko - no privileged mode)
  # ============================================
  docker-build:
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
      - event: tag
    environment:
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - mkdir -p /kaniko/.docker
      - echo "{\"auths\":{\"ghcr.io\":{\"username\":\"barryw\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json
      - /kaniko/executor --dockerfile=Dockerfile --context=. --destination=ghcr.io/barryw/paperless-webdav:${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}} --destination=ghcr.io/barryw/paperless-webdav:latest
    depends_on: [test, typecheck]

  # ============================================
  # Create GitHub Release (tags only)
  # ============================================
  github-release:
    image: ghcr.io/woodpeckerci/plugin-github-release:latest
    when:
      - event: tag
    settings:
      api_key:
        from_secret: github_token
      files: []
      title: ${CI_COMMIT_TAG}
      note: "Release ${CI_COMMIT_TAG}"
    depends_on: [docker-build]

  # ============================================
  # Deploy to Kubernetes (uses in-cluster service account)
  # ============================================
  deploy:
    image: bitnami/kubectl:latest
    when:
      - event: push
        branch: main
      - event: tag
    commands:
      - export IMAGE_TAG="${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}}"
      - echo "Deploying image tag $IMAGE_TAG"
      - kubectl set image deployment/paperless-webdav paperless-webdav=ghcr.io/barryw/paperless-webdav:$IMAGE_TAG
      - kubectl rollout status deployment/paperless-webdav --timeout=300s
    depends_on: [docker-build]
