# Woodpecker CI Pipeline for paperless-webdav
#
# Push to main: CI → build → deploy (commit SHA)
# Tag event:    build → release → deploy (semver)

labels:
  platform: linux/amd64

when:
  - event: [push, pull_request, tag, manual]

steps:
  # ============================================
  # CI: Lint, Typecheck, Test
  # ============================================
  lint:
    image: python:3.12-slim
    when:
      - event: [push, pull_request, manual]
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run ruff check src/ tests/
      - uv run ruff format --check src/ tests/

  typecheck:
    image: python:3.12-slim
    when:
      - event: [push, pull_request, manual]
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run mypy src/
    depends_on: [lint]

  test:
    image: python:3.12-slim
    when:
      - event: [push, pull_request, manual]
    environment:
      PAPERLESS_URL: http://paperless.test
      DATABASE_URL: postgresql://test:test@localhost/test
      ENCRYPTION_KEY: aa8D7QnZUqkFGBniEyIfESXitQUijPhSjQZLIqltUy4=
      SECRET_KEY: test-secret-key-for-sessions
    commands:
      - apt-get update && apt-get install -y gcc libldap2-dev libsasl2-dev
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run pytest --tb=short -q
    depends_on: [typecheck]

  # ============================================
  # Docker Build & Push to GHCR
  # ============================================
  docker-build:
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
      - event: tag
    environment:
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - mkdir -p /kaniko/.docker
      - "echo {\"auths\":{\"ghcr.io\":{\"username\":\"barryw\",\"password\":\"$GHCR_TOKEN\"}}} > /kaniko/.docker/config.json"
      - "export TAG=${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}}"
      - "echo Building image with tag $TAG"
      - "/kaniko/executor --dockerfile=Dockerfile --context=. --destination=ghcr.io/barryw/paperless-webdav:$TAG"
    depends_on: [test]

  # ============================================
  # Create GitHub Release (tags only)
  # ============================================
  github-release:
    image: ghcr.io/woodpeckerci/plugin-github-release:latest
    when:
      - event: tag
    settings:
      api_key:
        from_secret: github_token
      files: []
      title: ${CI_COMMIT_TAG}
      generate_release_notes: true
    depends_on: [docker-build]

  # ============================================
  # Deploy to Kubernetes
  # ============================================
  deploy:
    image: bitnami/kubectl:latest
    when:
      - event: push
        branch: main
      - event: tag
    commands:
      - "export TAG=${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}}"
      - "echo Deploying image with tag $TAG"
      - "kubectl -n default set image deployment/paperless-webdav paperless-webdav=ghcr.io/barryw/paperless-webdav:$TAG"
      - "kubectl -n default rollout status deployment/paperless-webdav --timeout=300s"
    depends_on: [docker-build]
