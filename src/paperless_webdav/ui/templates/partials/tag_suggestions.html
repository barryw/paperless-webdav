{% if tags %}
<ul class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-60 overflow-y-auto">
    {% for tag in tags %}
    <li class="tag-suggestion px-3 py-2 hover:bg-gray-100 cursor-pointer flex items-center gap-2"
        data-tag-id="{{ tag.id }}"
        data-tag-name="{{ tag.name }}"
        data-tag-color="{{ tag.color or '#808080' }}"
        data-field="{{ field }}"
        data-single="{{ 'true' if single else 'false' }}"
        onclick="selectTag(this)">
        <span class="w-3 h-3 rounded-full flex-shrink-0" style="background-color: {{ tag.color or '#808080' }};"></span>
        <span class="text-sm text-gray-700">{{ tag.name }}</span>
    </li>
    {% endfor %}
</ul>
{% else %}
{% if query %}
<div class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg p-3 text-sm text-gray-500">
    No tags found matching "{{ query }}"
</div>
{% endif %}
{% endif %}
